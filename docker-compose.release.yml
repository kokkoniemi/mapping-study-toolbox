services:
  app:
    image: ${MAPPING_TOOL_IMAGE:-ghcr.io/kokkoniemi/mapping-study-toolbox:latest}
    init: true
    restart: unless-stopped
    working_dir: /workspace-data
    environment:
      APP_DATA_DIR: /workspace-data
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      KEYWORDING_WORKER_URL: http://keywording-worker:8001
      GROBID_URL: http://grobid:8070
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace-data
    depends_on:
      keywording-worker:
        condition: service_started
      grobid:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  keywording-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ${MAPPING_TOOL_WORKER_IMAGE:-mapping-study-toolbox-keywording-worker:latest}
    init: true
    restart: unless-stopped
    working_dir: /app/worker
    environment:
      APP_DATA_DIR: /workspace-data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GROBID_URL: http://grobid:8070
    volumes:
      - ./:/workspace-data

  grobid:
    image: grobid/grobid:0.6.2
    init: true
    restart: unless-stopped
