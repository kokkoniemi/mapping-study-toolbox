services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    image: mapping-study-toolbox-backend-dev
    working_dir: /workspace
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: >
      sh -c "if [ ! -f config/config.json ]; then cp config/config.example.json config/config.json; fi &&
      node_modules/.bin/sequelize db:migrate &&
      exec node --watch --import tsx server.ts"
    volumes:
      - ./:/workspace
      - backend_node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    image: mapping-study-toolbox-frontend-dev
    working_dir: /workspace/ui
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: node ./node_modules/vite/bin/vite.js --host 0.0.0.0 --port 8080
    volumes:
      - ./:/workspace
      - ui_node_modules:/workspace/ui/node_modules
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_started

volumes:
  backend_node_modules:
  ui_node_modules:
