services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    image: mapping-study-toolbox-backend-dev
    working_dir: /workspace
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: /workspace/docker/dev-backend.sh
    volumes:
      - ./:/workspace
      - backend_node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      KEYWORDING_WORKER_URL: http://keywording-worker:8001
      KEYWORDING_WORKER_TIMEOUT_MS: ${KEYWORDING_WORKER_TIMEOUT_MS:-}
      KEYWORDING_ADVANCED_WORKER_TIMEOUT_MS: ${KEYWORDING_ADVANCED_WORKER_TIMEOUT_MS:-}
      GROBID_URL: http://grobid:8070
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

    depends_on:
      keywording-worker:
        condition: service_started
      grobid:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    image: mapping-study-toolbox-frontend-dev
    working_dir: /workspace/ui
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: /workspace/docker/dev-frontend.sh
    volumes:
      - ./:/workspace
      - ui_node_modules:/workspace/ui/node_modules
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_healthy

  keywording-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: mapping-study-toolbox-keywording-worker-dev
    working_dir: /workspace/worker
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: uvicorn app:app --app-dir /workspace/worker --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./:/workspace
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GROBID_URL: http://grobid:8070
      APP_DATA_DIR: /workspace

  grobid:
    image: grobid/grobid:0.6.2
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 20s
    ports:
      - "8070:8070"

volumes:
  backend_node_modules:
  ui_node_modules:
